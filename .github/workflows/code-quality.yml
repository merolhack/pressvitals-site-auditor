name: Code Quality

on:
  push:
    branches: [ main, trunk ]
  pull_request:

jobs:
  phpcs:
    name: PHPCS (WordPress Coding Standards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPCS
        run: composer phpcs

  plugin-check:
    name: WordPress Plugin Check (PCP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          exclude-directories: 'vendor,node_modules,tests,.github,bin'
          exclude-files: 'LLM_WIKI.md,TODO.md,HISTORY.md,omnihealth-site-auditor.zip,.distignore,phpcs.xml,composer.lock,phpunit.xml.dist'
